name: Feature request
description: Propose new functionality or a design change
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Check PROJECT_NOTES.md first — several decisions (language, naming,
        crate layout) are settled, and the roadmap may already cover your idea.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today? Describe the need, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you'd like it to work. Sketches and CLI examples welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
