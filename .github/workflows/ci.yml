name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

permissions:
  contents: read

jobs:
  lint:
    name: Lint (rustfmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories

  licenses:
    name: License compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses bans sources

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Test
        run: cargo test --workspace

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Build and test under instrumentation
        # The e2e/net_e2e suites shell out to the `weft` binary, which loads
        # libweft_shim.so next to itself at runtime -- a file-path convention
        # invisible to Cargo's dependency graph. `cargo llvm-cov` alone only
        # builds what's needed to run tests (not necessarily every crate's
        # cdylib target), so libweft_shim.so never lands next to the
        # coverage-instrumented `weft` binary and those suites fail with
        # "cannot find libweft_shim.so". An explicit `cargo build --all-targets`
        # under the same instrumented environment (`show-env`) fixes that;
        # `report`/`clean` are the only cargo-llvm-cov subcommands safe to run
        # inside a show-env session, so building/testing use plain cargo.
        run: |
          source <(cargo llvm-cov show-env --sh)
          cargo llvm-cov clean --workspace
          cargo build --workspace --all-targets
          cargo test --workspace
          cargo llvm-cov report --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
