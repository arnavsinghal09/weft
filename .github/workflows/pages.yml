name: Docs site

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - "docs/**"
      - "README.md"
      - "LIMITATIONS.md"
      - "VERSIONING.md"
      - "ROADMAP.md"
      - "REVIEW_FINDINGS.md"
      - "DEVELOPMENT.md"
      - "CONTRIBUTING.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdbook
        uses: taiki-e/install-action@mdbook
      - name: Build book
        run: mdbook build docs-site
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
